---
# tasks file for apache
---
- name: Install Apache
  apt:
    name: apache2
    state: present
    update_cache: yes

- name: Start Apache
  service:
    name: apache2
    state: started
    enabled: yes

- name: Copy website
  copy:
    src: index.html
    dest: /var/www/html/index.html

- name: Restart Apache
  service:
    name: apache2
    state: restarted
